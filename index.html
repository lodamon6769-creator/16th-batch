href="https://fonts.googleapis.com">

href="https://fonts.gstatic.com"
crossorigin>

rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

:root{

--primary:#0d5460;
--primary-light:#176b73;
--secondary:#FFD700;
--accent:#ff6b6b;
--text:#17434b;
--text-light:#35565b;

--glass:
rgba(255,255,255,.18);

--glass2:
rgba(255,255,255,.28);

}

::selection{

background:#FFD700;
color:white;

}

body{

min-height:100vh;

overflow-x:hidden;

padding-bottom:120px;

color:var(--text);

background:

linear-gradient(
-45deg,
#ff512f,
#dd2476,
#24c6dc,
#f9d423,
#6a11cb
);

background-size:500% 500%;

animation:bgMove 18s ease infinite;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

/* ===========================
   Animated Glow
=========================== */

body::before{

content:"";

position:fixed;

top:-180px;
left:-180px;

width:430px;
height:430px;

border-radius:50%;

background:

radial-gradient(circle,
rgba(255,255,255,.25),
transparent 70%);

filter:blur(60px);

animation:glow1 12s infinite alternate;

z-index:-2;

}

body::after{

content:"";

position:fixed;

right:-180px;
bottom:-180px;

width:430px;
height:430px;

border-radius:50%;

background:

radial-gradient(circle,
rgba(255,215,0,.28),
transparent 70%);

filter:blur(65px);

animation:glow2 14s infinite alternate;

z-index:-2;

}

@keyframes glow1{

from{

transform:
translate(0,0);

}

to{

transform:
translate(120px,80px);

}

}

@keyframes glow2{

from{

transform:
translate(0,0);

}

to{

transform:
translate(-120px,-90px);

}

}

/* ===========================
 Loader
=========================== */

.loader{

position:fixed;

inset:0;

display:flex;

justify-content:center;
align-items:center;

background:white;

z-index:99999;

animation:

hideLoader
2s forwards;

}

.loader span{

font-size:65px;

animation:

loaderSpin
1s infinite;

}

@keyframes loaderSpin{

50%{

transform:
rotate(180deg);

}

}

@keyframes hideLoader{

0%,80%{

opacity:1;

}

100%{

opacity:0;

visibility:hidden;

}

}

/* ===========================
 Floating Circles
=========================== */

.circle{

position:fixed;

border-radius:50%;

background:

rgba(255,255,255,.18);

filter:blur(4px);

animation:

floatCircle
8s ease-in-out infinite;

z-index:-1;

}

.c1{

width:180px;
height:180px;

top:6%;
left:6%;

}

.c2{

width:240px;
height:240px;

bottom:8%;
right:6%;

animation-delay:2s;

}

@keyframes floatCircle{

0%,100%{

transform:
translateY(0);

}

50%{

transform:
translateY(-35px);

}

}

/* ===========================
 HERO
=========================== */

.hero{

max-width:1200px;

margin:auto;

text-align:center;

padding:

40px 20px
50px;

animation:

heroDown
1s ease;

}

@keyframes heroDown{

from{

opacity:0;

transform:
translateY(-50px);

}

to{

opacity:1;

transform:
translateY(0);

}

}

.logo{

display:flex;

justify-content:center;

margin-bottom:25px;

}

.logo img{

width:170px;
height:170px;

padding:10px;

background:white;

border-radius:50%;

object-fit:cover;

border:5px solid white;

box-shadow:

0 18px 55px rgba(0,0,0,.25),

0 0 35px rgba(255,215,0,.35);

animation:

logoFloat
5s infinite ease-in-out;

transition:.45s;

}

.logo img:hover{

transform:

scale(1.08)
rotate(5deg);

}

@keyframes logoFloat{

0%,100%{

transform:
translateY(0);

}

50%{

transform:
translateY(-12px);

}

}

.batch{

display:inline-block;

padding:

10px 26px;

margin-bottom:20px;

border-radius:40px;

background:

rgba(255,255,255,.18);

backdrop-filter:

blur(20px);

border:

1px solid rgba(255,255,255,.35);

color:white;

font-weight:700;

letter-spacing:2px;

text-transform:uppercase;

}

.hero h1{

font-size:

clamp(
2.8rem,
6vw,
4.8rem
);

font-weight:900;

color:white;

text-shadow:

0 6px 25px
rgba(0,0,0,.25);

margin-bottom:15px;

}

.hero p{

max-width:760px;

margin:auto;

font-size:18px;

line-height:1.9;

color:white;

opacity:.96;

}

.divider{

width:130px;

height:5px;

margin:35px auto;

border-radius:50px;

background:

linear-gradient(
90deg,
#FFD700,
white,
#FFD700);

box-shadow:

0 0 18px
rgba(255,215,0,.6);

}
   /* ===========================
   Glass Section
=========================== */

.glass{

max-width:1200px;

margin:28px auto;

padding:35px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(24px);

border-radius:30px;

border:1px solid rgba(255,255,255,.35);

box-shadow:
0 20px 60px rgba(0,0,0,.15);

position:relative;

overflow:hidden;

transition:.45s;

}

.glass::before{

content:"";

position:absolute;

top:-120px;
right:-120px;

width:220px;
height:220px;

border-radius:50%;

background:
radial-gradient(circle,
rgba(255,255,255,.35),
transparent 70%);

transition:.45s;

}

.glass:hover::before{

transform:scale(1.35);

}

.glass:hover{

transform:translateY(-8px);

box-shadow:
0 35px 80px rgba(0,0,0,.20);

}

/* ===========================
 Section Title
=========================== */

.glass h2{

text-align:center;

font-size:34px;

font-weight:800;

color:white;

margin-bottom:30px;

text-shadow:
0 5px 18px rgba(0,0,0,.18);

}

/* ===========================
 Countdown
=========================== */

.countdown{

display:flex;

justify-content:center;

gap:20px;

flex-wrap:wrap;

}

.time-box{

width:120px;

padding:28px 15px;

border-radius:22px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.35);

text-align:center;

color:white;

font-weight:700;

transition:.4s;

}

.time-box:hover{

transform:
translateY(-8px)
scale(1.05);

background:
rgba(255,255,255,.26);

}

.time-box span{

display:block;

font-size:42px;

font-weight:900;

margin-bottom:8px;

color:#FFD700;

text-shadow:
0 0 18px rgba(255,215,0,.5);

}

/* ===========================
 Notices
=========================== */

.notice{

padding:22px 24px;

margin:18px 0;

border-radius:18px;

background:rgba(255,255,255,.16);

border-left:5px solid #FFD700;

color:white;

font-size:17px;

font-weight:600;

backdrop-filter:blur(15px);

transition:.35s;

}

.notice:hover{

transform:translateX(12px);

background:
rgba(255,255,255,.25);

}

/* ===========================
 Explore Cards
=========================== */

.cards{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(220px,1fr));

gap:22px;

}

.card{

padding:32px 18px;

border-radius:24px;

text-align:center;

text-decoration:none;

font-size:22px;

font-weight:800;

background:rgba(255,255,255,.20);

color:white;

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,.35);

transition:.45s;

box-shadow:
0 15px 40px rgba(0,0,0,.15);

}

.card:hover{

transform:
translateY(-12px)
scale(1.05);

background:white;

color:#0d5460;

box-shadow:
0 30px 70px rgba(0,0,0,.20);

}

.card span{

display:block;

font-size:55px;

margin-bottom:15px;

}
   /* ===========================
   Teacher Preview
=========================== */

.teacher-row{

display:flex;

gap:22px;

overflow-x:auto;

padding:10px 5px 18px;

scroll-behavior:smooth;

}

.teacher-row::-webkit-scrollbar{

height:8px;

}

.teacher-row::-webkit-scrollbar-thumb{

background:#FFD700;

border-radius:20px;

}

.teacher{

min-width:180px;

padding:24px 18px;

text-align:center;

border-radius:24px;

background:rgba(255,255,255,.20);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.35);

color:white;

transition:.45s;

box-shadow:

0 15px 40px rgba(0,0,0,.16);

}

.teacher:hover{

transform:

translateY(-12px)
scale(1.05);

background:white;

color:#0d5460;

}

.teacher img{

width:90px;
height:90px;

border-radius:50%;

object-fit:cover;

border:4px solid white;

margin-bottom:12px;

box-shadow:

0 10px 30px rgba(0,0,0,.25);

transition:.4s;

}

.teacher:hover img{

transform:

scale(1.12)
rotate(5deg);

border-color:#FFD700;

}

.teacher h3{

font-size:18px;

font-weight:800;

margin-bottom:8px;

}

.teacher p{

font-size:14px;

font-weight:600;

opacity:.95;

}

/* ===========================
 Quote
=========================== */

.quote{

text-align:center;

font-size:20px;

line-height:1.9;

color:white;

font-weight:600;

max-width:850px;

margin:auto;

}

/* ===========================
 Footer
=========================== */

footer{

margin:80px auto 30px;

padding:30px 20px;

text-align:center;

max-width:900px;

color:white;

}

footer h2{

font-size:34px;

font-weight:900;

margin-bottom:18px;

}

footer p{

font-size:17px;

line-height:1.9;

opacity:.96;

}

.footer-divider{

width:130px;

height:5px;

margin:30px auto;

border-radius:50px;

background:

linear-gradient(
90deg,
#FFD700,
white,
#FFD700);

box-shadow:

0 0 18px rgba(255,215,0,.6);

}

.footer-credit{

font-size:19px;

font-weight:700;

margin-top:20px;

}

/* ===========================
 Bottom Navigation
=========================== */

.bottom-nav{

position:fixed;

left:50%;

bottom:18px;

transform:translateX(-50%);

width:min(430px,94%);

height:72px;

display:flex;

justify-content:space-around;

align-items:center;

background:rgba(255,255,255,.20);

backdrop-filter:blur(24px);

border-radius:45px;

border:1px solid rgba(255,255,255,.35);

box-shadow:

0 20px 45px rgba(0,0,0,.18);

z-index:999;

}

.bottom-nav a{

width:56px;
height:56px;

display:flex;

justify-content:center;

align-items:center;

font-size:28px;

text-decoration:none;

border-radius:50%;

color:white;

transition:.35s;

}

.bottom-nav a:hover{

background:white;

color:#0d5460;

transform:

translateY(-8px)
scale(1.12);

}

.bottom-nav a.active{

background:#FFD700;

color:#12363d;

}

/* ===========================
 Floating Buttons
=========================== */

.top-btn,
.music-btn{

position:fixed;

width:55px;
height:55px;

border:none;

border-radius:50%;

background:white;

font-size:24px;

cursor:pointer;

box-shadow:

0 10px 25px rgba(0,0,0,.20);

transition:.35s;

z-index:999;

}

.top-btn{

left:20px;

bottom:95px;

display:none;

}

.music-btn{

right:20px;

bottom:95px;

}

.top-btn:hover,
.music-btn:hover{

transform:

scale(1.12)
rotate(10deg);

}

/* ===========================
 Reveal Animation
=========================== */

.reveal{

opacity:0;

transform:translateY(40px);

transition:all .8s ease;

}

.reveal.active{

opacity:1;

transform:translateY(0);

}

/* ===========================
 Responsive
=========================== */

@media(max-width:992px){

.cards{

grid-template-columns:

repeat(auto-fit,minmax(220px,1fr));

}

.teacher{

min-width:170px;

}

}

@media(max-width:768px){

.hero{

padding:30px 15px 40px;

}

.logo img{

width:130px;
height:130px;

}

.hero h1{

font-size:2.3rem;

}

.hero p{

font-size:15px;

}

.glass{

padding:24px 18px;

margin:20px 12px;

}

.glass h2{

font-size:26px;

}

.time-box{

width:95px;

padding:20px 10px;

}

.time-box span{

font-size:32px;

}

.teacher{

min-width:150px;

}

.teacher img{

width:75px;
height:75px;

}

.bottom-nav{

height:65px;

}

.bottom-nav a{

font-size:24px;

}

}

@media(max-width:480px){

.cards{

grid-template-columns:1fr;

}

.teacher-row{

gap:16px;

}

.teacher{

min-width:140px;

}

footer h2{

font-size:26px;

}

footer p{

font-size:15px;

}

.hero h1{

font-size:1.9rem;

}

.batch{

font-size:12px;

padding:8px 18px;

}

}

<!-- Confetti -->

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<script>

/* ===========================
   Confetti
=========================== */

window.addEventListener("load",()=>{

    setTimeout(()=>{

        confetti({

            particleCount:220,

            spread:100,

            origin:{y:.6}

        });

    },900);

});


/* ===========================
   Countdown
=========================== */

const eventDate=new Date("July 29, 2026 10:00:00").getTime();

setInterval(()=>{

    const now=new Date().getTime();

    const distance=eventDate-now;

    const days=Math.floor(distance/(1000*60*60*24));

    const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));

    const minutes=Math.floor((distance%(1000*60*60))/(1000*60));

    const seconds=Math.floor((distance%(1000*60))/1000);

    document.getElementById("days").textContent=days<0?0:days;
    document.getElementById("hours").textContent=hours<0?0:hours;
    document.getElementById("minutes").textContent=minutes<0?0:minutes;
    document.getElementById("seconds").textContent=seconds<0?0:seconds;

},1000);


/* ===========================
   Scroll Reveal
=========================== */

const reveals=document.querySelectorAll(".reveal");

const revealObserver=new IntersectionObserver((entries)=>{

    entries.forEach(entry=>{

        if(entry.isIntersecting){

            entry.target.classList.add("active");

        }

    });

},{
    threshold:.15
});

reveals.forEach(item=>{

    revealObserver.observe(item);

});


/* ===========================
   Card Click Animation
=========================== */

document.querySelectorAll(".card").forEach(card=>{

    card.addEventListener("click",()=>{

        card.style.transform="scale(.95)";

        setTimeout(()=>{

            card.style.transform="";

        },180);

    });

});


/* ===========================
   Back To Top
=========================== */

const topBtn=document.getElementById("topBtn");

window.addEventListener("scroll",()=>{

    if(window.scrollY>350){

        topBtn.style.display="block";

    }else{

        topBtn.style.display="none";

    }

});

function topPage(){

    window.scrollTo({

        top:0,

        behavior:"smooth"

    });

}


/* ===========================
   Floating Sparkles
=========================== */

function sparkle(){

    const s=document.createElement("span");

    s.innerHTML="✨";

    s.style.position="fixed";

    s.style.left=Math.random()*100+"vw";

    s.style.top="100vh";

    s.style.fontSize=(16+Math.random()*16)+"px";

    s.style.pointerEvents="none";

    s.style.zIndex="999";

    document.body.appendChild(s);

    s.animate([

        {transform:"translateY(0)",opacity:0},

        {opacity:1},

        {transform:"translateY(-110vh) rotate(360deg)",opacity:0}

    ],{

        duration:6500,

        easing:"linear"

    });

    setTimeout(()=>{

        s.remove();

    },6500);

}

setInterval(sparkle,1200);


/* ===========================
   Bottom Navigation Active
=========================== */

document.querySelectorAll(".bottom-nav a").forEach(link=>{

    link.addEventListener("click",()=>{

        document.querySelectorAll(".bottom-nav a")
        .forEach(a=>a.classList.remove("active"));

        link.classList.add("active");

    });

});


console.log("%c16th Batch","font-size:24px;color:#FFD700;font-weight:bold;");
console.log("%cTeachers' Day 2026","font-size:18px;color:white;");
console.log("%cDesigned with ❤️ by the 16th Batch","font-size:14px;color:#FFD700;");

</script>
